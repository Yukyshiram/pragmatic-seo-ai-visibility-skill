name: Publish

on:
    release:
        types: [published]

jobs:
    publish:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            id-token: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  registry-url: "https://registry.npmjs.org"

            - name: Verify Node.js is available
              run: node --version

            - name: Check canonical skill file exists and is not empty
              run: test -s skill/PRAGMATIC_SEO_AI_VISIBILITY_SKILL.md

            - name: Check canonical skill file is well-formed
              run: grep -q "## PART 1 — OPERATING PRINCIPLES" skill/PRAGMATIC_SEO_AI_VISIBILITY_SKILL.md

            - name: Check install script is executable
              run: test -f bin/install.js

            - name: Verify package version matches release tag
              run: |
                  PKG_VERSION=$(node -p "require('./package.json').version")
                  TAG_VERSION="${GITHUB_REF_NAME#v}"
                  if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
                    echo "❌ Version mismatch: package.json has $PKG_VERSION but release tag is $GITHUB_REF_NAME"
                    exit 1
                  fi
                  echo "✅ Version match: $PKG_VERSION"

            - name: Publish to npm
              run: npm publish --provenance --access public
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}